name: Spec Reminder

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect source/spec changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          CHANGED="$(git diff --name-only "$BASE" "$HEAD")"

          if echo "$CHANGED" | grep -Eq '^src/.*\.(ts|tsx|js|jsx|css)$'; then
            echo "source_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "source_changed=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED" | grep -Eq '^specs/.*\.md$'; then
            echo "spec_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "spec_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment reminder
        if: steps.detect.outputs.source_changed == 'true' && steps.detect.outputs.spec_changed == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "Spec-driven reminder:",
              "- This PR changes files under `src/` but no spec was updated under `specs/`.",
              "- Add or update a spec using `specs/templates/feature-spec.md`.",
              "- Include acceptance criteria tied to the behavior changed in this PR."
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
